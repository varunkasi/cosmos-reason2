services:
  cosmos-reason2:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - /workspace/.venv
      - /workspace/examples/cosmos_rl/.venv
      - ${HOME}/.cache:/root/.cache
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # vLLM model server (GPU) — serves OpenAI-compatible API on port 8000
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      vllm serve ${MODEL:-nvidia/Cosmos-Reason2-8B}
      --allowed-local-media-path /hostfs
      --max-model-len ${MAX_MODEL_LEN:-16384}
      --media-io-kwargs '{"video": {"num_frames": 64, "fps": 2}}'
      --reasoning-parser qwen3
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.9}
      --port 8000
    volumes:
      - .:/workspace
      - /workspace/.venv
      - /workspace/examples/cosmos_rl/.venv
      - ${HOME}/.cache:/root/.cache
      - /:/hostfs:ro
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  # Web UI + API (no GPU needed) — proxies inference to vLLM
  web:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/workspace/docker/entrypoint_web.sh"]
    command: >
      python -m cosmos_reason2_utils.web.app
      --host 0.0.0.0 --port 9900
      --vllm-url http://vllm:8000
    ports:
      - "9900:9900"
    volumes:
      - .:/workspace
      - /workspace/.venv
      - /workspace/examples/cosmos_rl/.venv
      - /:/hostfs:ro
    environment:
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      vllm:
        condition: service_healthy
